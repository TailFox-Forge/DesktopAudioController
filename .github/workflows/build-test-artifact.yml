name: Build Test Artifact

on:
  workflow_dispatch:
    inputs:
      artifact_suffix:
        description: "Optional suffix for the artifact version"
        required: false
        default: ""
  push:
    branches:
      - "test/**"

permissions:
  contents: read

jobs:
  build-win-x64:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Resolve artifact version
        shell: pwsh
        run: |
          [xml]$project = Get-Content src/DesktopAudioController/DesktopAudioController.csproj
          $projectVersion = $project.Project.PropertyGroup.Version | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw "Project Version is missing in DesktopAudioController.csproj."
          }

          $sha = "${{ github.sha }}".Substring(0, 7)
          $suffix = "${{ inputs.artifact_suffix }}"
          if ([string]::IsNullOrWhiteSpace($suffix)) {
            $suffix = "test-$sha"
          }

          $safeSuffix = $suffix.Trim() -replace '[^A-Za-z0-9._-]', '-'
          if ([string]::IsNullOrWhiteSpace($safeSuffix)) {
            $safeSuffix = "test-$sha"
          }

          $version = "v$projectVersion-$safeSuffix"
          $runtimeId = "win-x64"
          $packageBaseName = "DesktopAudioController-$version-$runtimeId"
          $packagePath = "artifacts/release/packages/$packageBaseName.zip"
          $checksumPath = "$packagePath.sha256"

          "ARTIFACT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_BASENAME=$packageBaseName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_PATH=$packagePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CHECKSUM_PATH=$checksumPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore tests
        shell: pwsh
        run: |
          dotnet restore tests/DesktopAudioController.Tests/DesktopAudioController.Tests.csproj `
            -p:EnableWindowsTargeting=true

      - name: Test
        shell: pwsh
        run: |
          dotnet test tests/DesktopAudioController.Tests/DesktopAudioController.Tests.csproj `
            -c Release `
            -p:EnableWindowsTargeting=true `
            --no-restore

      - name: Publish package
        shell: bash
        env:
          DOTNET_BIN: dotnet
        run: |
          bash scripts/publish-win-x64.sh "$ARTIFACT_VERSION"

      - name: Verify sha256
        shell: bash
        run: |
          cd artifacts/release/packages
          sha256sum -c "${PACKAGE_BASENAME}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASENAME }}
          path: |
            ${{ env.PACKAGE_PATH }}
            ${{ env.CHECKSUM_PATH }}
          if-no-files-found: error
